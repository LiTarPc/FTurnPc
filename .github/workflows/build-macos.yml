name: Build macOS

on:
  push:
    branches: [main, master, CobaltTheme]
  pull_request:
    branches: [main, master, CobaltTheme]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS (Apple Silicon)
        run: wails build -platform darwin/arm64

      - name: Save arm64 binary
        run: |
          cp build/bin/FTurnPc.app/Contents/MacOS/FTrunPc build/bin/FTrunPc-arm64

      - name: Build macOS (Intel)
        run: wails build -platform darwin/amd64

      - name: Create universal binary
        run: |
          lipo -create build/bin/FTrunPc-arm64 build/bin/FTurnPc.app/Contents/MacOS/FTrunPc -output build/bin/FTurnPc.app/Contents/MacOS/FTrunPc-universal
          mv build/bin/FTurnPc.app/Contents/MacOS/FTrunPc-universal build/bin/FTurnPc.app/Contents/MacOS/FTrunPc

      - name: List build output
        run: |
          ls -la build/bin/FTurnPc.app/Contents/MacOS/
          lipo -info build/bin/FTurnPc.app/Contents/MacOS/FTrunPc

      - name: Zip .app bundle
        run: cd build/bin && zip -r FTrunPc-macos-universal.zip FTurnPc.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTrunPc-macos-universal
          path: build/bin/FTrunPc-macos-universal.zip
