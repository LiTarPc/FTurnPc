name: Build

on:
  push:
    branches: [main, master, CobaltTheme]
    tags: ['v*']
  pull_request:
    branches: [main, master, CobaltTheme]
  workflow_dispatch:

jobs:
  build-linux-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev pkg-config gcc libgtk-3-dev webkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -platform linux/amd64 -tags webkit2_41 -o FTrunPc

      - name: Build Windows
        run: wails build -platform windows/amd64 -o FTrunPc.exe

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTrunPc
          path: build/bin/FTrunPc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTrunPc-windows-amd64
          path: build/bin/FTrunPc.exe
